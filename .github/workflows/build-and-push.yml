name: Build and Push Spacebot+OpenCode Image

on:
  push:
    branches:
      - master
      - "release/**"
      - "v*"
  pull_request:
    branches:
      - master

env:
  IMAGE_NAME: spacebot-opencode

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (cross-platform build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

          platforms: linux/amd64

          # Cache layers for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

          # Pass versions as build args
          build-args: |
            SPACEBOT_VERSION=${{ vars.SPACEBOT_VERSION || 'latest' }}
            OPENCODE_VERSION=${{ vars.OPENCODE_VERSION || 'latest' }}
