name: Build and Push Spacebot+OpenCode Image

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  IMAGE_NAME: spacebot-opencode

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine new version
        id: version
        run: |
          # Get all v0.* tags, sort them, and find the latest
          git fetch --tags origin
          
          # Find the latest v0.x tag
          latest_tag=$(git tag -l 'v0.*' --sort=-v:refname | head -n 1)
          
          if [ -z "$latest_tag" ]; then
            # No existing v0 tags, start at v0.1
            new_version="v0.1"
          else
            # Extract the minor version and increment
            minor=$(echo "$latest_tag" | sed 's/v0\.\(.*\)/\1/')
            new_minor=$((minor + 1))
            new_version="v0.$new_minor"
          fi
          
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "Latest tag: $latest_tag -> New tag: $new_version"

      - name: Create new version tag
        if: github.ref_name == 'master'
        uses: actions/github-script@v7
        with:
          script: |
            const newVersion = '${{ steps.version.outputs.new_version }}';
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${newVersion}`,
              sha: context.sha
            });
            console.log(`Created tag: ${newVersion}`);

  build:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (cross-platform build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.new_version }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

          platforms: linux/amd64

          # Pass versions as build args
          build-args: |
            SPACEBOT_VERSION=${{ vars.SPACEBOT_VERSION || 'latest' }}
            OPENCODE_VERSION=${{ vars.OPENCODE_VERSION || 'latest' }}
